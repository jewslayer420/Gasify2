services:
  - type: web
    name: gasify-api
    runtime: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: TANKERKOENIG_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
