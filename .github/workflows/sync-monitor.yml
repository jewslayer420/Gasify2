name: Sync monitor (hourly Discord report)

# Hourly heartbeat + health check, independent of the sync jobs. Every hour it
# posts one Discord (and/or Telegram) message: overall health (all countries vs
# a stale list) and which countries completed a sync in the past hour with how
# many prices actually moved. Catches a total sync outage, a partial failure,
# or a dead DB — none of which the sync runs surface on their own.
# Delivery needs DISCORD_WEBHOOK_URL (free, no phone) and/or
# TELEGRAM_BOT_TOKEN + TELEGRAM_CHAT_ID as repo secrets.

on:
  schedule:
    - cron: '45 * * * *'   # hourly at :45, after the sync runs land
  workflow_dispatch: {}

concurrency:
  group: sync-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm ci
      - run: npx prisma generate
      - run: node src/scripts/hourly_report.js
